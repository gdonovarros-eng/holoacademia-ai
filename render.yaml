services:
  - type: web
    name: holoacademia-ai
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    autoDeployTrigger: commit
    healthCheckPath: /health
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: LLM_PROVIDER
        value: groq
      - key: LLM_BASE_URL
        value: https://api.groq.com/openai/v1
      - key: COURSE_ASSISTANT_USE_MODEL
        value: "true"
      - key: OPENAI_MODEL
        value: openai/gpt-oss-20b
      - key: OPENAI_IMAGE_MODEL
        value: gpt-image-1
      - key: OPENAI_EMBEDDING_MODEL
        value: text-embedding-3-small
      - key: OPENAI_RESPONSE_TIMEOUT_SECONDS
        value: "30"
      - key: OPENAI_REASONING_EFFORT
        value: high
